version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       linkedpilot
      POSTGRES_USER:     linkedpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://linkedpilot:${POSTGRES_PASSWORD:-changeme}@postgres:5432/linkedpilot
      REDIS_URL:    redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (executes tasks) ───────────────────────────────────────────
  celery_worker:
    build: ./backend
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://linkedpilot:${POSTGRES_PASSWORD:-changeme}@postgres:5432/linkedpilot
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  # ── Celery Beat (scheduler: pipeline + scheduled posts) ──────────────────────
  celery_beat:
    build: ./backend
    command: celery -A celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://linkedpilot:${POSTGRES_PASSWORD:-changeme}@postgres:5432/linkedpilot
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
